{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Glitch Getaway</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="terminal">
<button id="theme-switcher"
        style="position: fixed; top: 10px; right: 10px; padding: 5px 10px; cursor: pointer;">
    Switch Theme
</button>

<div class="terminal-screen">
    <div class="terminal-header">
        <p>GlitchGetaway &mdash; Login</p>
    </div>
    <div class="terminal-body">
        <pre class="flicker">[[ IDENTITY VERIFICATION ]]</pre>
        <pre>Login to track your scores on the leaderboard.</pre>
        <br>
        <form method="POST">
            {% csrf_token %}
            <pre>> Username: <input type="text" name="username" class="terminal-input" autocomplete="off" autofocus required></pre>
            <pre>> Password: <input type="password" name="password" class="terminal-input" required></pre>
            <br>
            <button type="submit" class="terminal-button">[ ACCESS GRANTED ]</button>
        </form>

        {% if error %}
        <br>
        <pre class="flicker error">{{ error }}</pre>
        {% endif %}

        <br>
        <pre>No account yet? <a href="{% url 'register' %}" class="terminal-link">Register here</a></pre>
        <pre>Play as guest? <a href="{% url 'home' %}" class="terminal-link">Start mission</a></pre>
    </div>
</div>
<script>
    window.addEventListener('DOMContentLoaded', () => {
        const body = document.querySelector('body');
        let theme = localStorage.getItem('theme');
        if (!theme) {
            const hr = new Date().getHours();
            theme = (hr >= 7 && hr <= 19) ? 'light' : 'dark';
            localStorage.setItem('theme', theme);
        }
        applyTheme(theme);
        const switcher = document.getElementById('theme-switcher');
        let darkMode = (theme === 'dark');
        switcher.addEventListener('click', () => {
            darkMode = !darkMode;
            theme = darkMode ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
            applyTheme(theme);
        });
        function applyTheme(theme) {
            const styles = {
                light: { bg: 'white', text: 'black', border: 'black', header: 'white' },
                dark: { bg: 'black', text: '#00FF00', border: '#00FF00', header: 'black' }
            };
            const t = styles[theme];
            body.style.setProperty('--background-color', t.bg);
            body.style.setProperty('--text-color', t.text);
            body.style.setProperty('--border-color', t.border);
            body.style.setProperty('--header-text-color', t.header);
        }
    });
</script>
</body>
</html>
